<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>World Explorer</h1>
      <p>Explora países del mundo con filtros, ordenamiento y una vista detallada de información geográfica y cultural.</p>
    </header>

    <section class="controls" aria-label="Controles de búsqueda y filtro">
      <div class="control-group">
        <label for="searchInput">Buscar país</label>
        <input id="searchInput" type="search" placeholder="Ej. Colombia, Japan, France..." autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="regionSelect">Región</label>
        <select id="regionSelect">
          <option value="all">Todas</option>
          <option value="Africa">África</option>
          <option value="Americas">Américas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europa</option>
          <option value="Oceania">Oceanía</option>
        </select>
      </div>
      <div class="control-group">
        <label for="sortSelect">Ordenar por</label>
        <select id="sortSelect">
          <option value="name">Nombre</option>
          <option value="population">Población</option>
          <option value="area">Área</option>
        </select>
      </div>
    </section>

    <div class="status" id="status" aria-live="polite"></div>
    <section class="countries-grid" id="countriesGrid" aria-label="Listado de países"></section>
  </main>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="close-btn" id="closeModalBtn" aria-label="Cerrar modal">✕</button>
      <div id="modalContent"></div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
